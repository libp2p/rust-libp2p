version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase" # combination of increase with ignoring patch releases
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    open-pull-requests-limit: 9999
    commit-message:
      prefix: "deps"
    rebase-strategy: "disabled"
    groups:
      hickory-dns:
        patterns:
          - "hickory-*"
      opentelemetry:
        patterns:
          - "opentelemetry*"
          - "tracing-opentelemetry"
      axum:
        patterns:
          - "axum"
          - "tower"
          - "tower-http"
      webrtc:
        patterns:
          - "rcgen"
          - "webrtc"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "deps"
    rebase-strategy: "disabled"
